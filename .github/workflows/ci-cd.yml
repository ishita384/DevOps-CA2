name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    
    # 1. Get code from GitHub
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Install Node.js
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 3. Install dependencies
    - name: Install dependencies
      run: npm install

    # 4. Run tests
    - name: Run tests
      run: npm test

    # 5. Build Docker image
    - name: Build Docker image
      run: docker build -t node-ci-app .

    # 6. Run Docker container
    - name: Run container
      run: docker run -d -p 3000:3000 node-ci-app

    # 7. Deployment step (simulation)
    - name: Deploy
      run: echo "Deployment successful 🚀"
